<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Bot</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: sans-serif; background:#0b1220; color:white; padding:10px }
.card { background:#1a2842; padding:12px; border-radius:12px; margin:10px 0 }
textarea, select { width:100%; padding:10px; border-radius:10px; margin-bottom:10px }
button { padding:10px; border-radius:10px; background:#5ea8ff; border:none; color:black; font-weight:bold }
#map { height:300px; margin-top:10px; border-radius:10px }
</style>
</head>

<body>

<h2>Weather Bot</h2>

<label>Unit:</label>
<select id="unitSelect">
  <option value="C">Celsius (°C)</option>
  <option value="F">Fahrenheit (°F)</option>
</select>

<textarea id="locations">Grapevine, TX</textarea>
<button onclick="runWeatherBot()">Get Weather</button>

<h3>Pick from map</h3>
<div id="map"></div>
<button onclick="addMapLocation()">Add selected location</button>

<div id="results"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let unit = "C";
let selectedCoords = null;

document.getElementById("unitSelect").addEventListener("change", e=>{
  unit = e.target.value;
});

function convertTemp(c){
  return unit === "F" ? (c * 9/5 + 32) : c;
}

async function geocode(query){
  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}`);
  const data = await res.json();
  return data.results?.[0];
}

async function weather(lat,lon){
  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m&hourly=temperature_2m&daily=temperature_2m_max,temperature_2m_min`
  );
  return res.json();
}

async function runWeatherBot(){
  const inputs = document.getElementById("locations").value.split("\n");
  const results = document.getElementById("results");
  results.innerHTML="";

  for(const loc of inputs){
    let lat,lon,label=loc;

    if(loc.startsWith("@")){
      const [coords,name] = loc.split("|");
      const [la,lo] = coords.replace("@","").split(",");
      lat=la; lon=lo; label=name;
    } else {
      const place = await geocode(loc.replace("United States",""));
      if(!place){
        results.innerHTML += `<div>No match for ${loc}</div>`;
        continue;
      }
      lat=place.latitude; lon=place.longitude;
      label = place.name;
    }

    const data = await weather(lat,lon);

    const current = convertTemp(data.current.temperature_2m);

    let hourly="";
    for(let i=0;i<12;i++){
      const t = convertTemp(data.hourly.temperature_2m[i]);
      hourly += `<div>${t.toFixed(1)}°${unit}</div>`;
    }

    let daily="";
    for(let i=0;i<5;i++){
      const max = convertTemp(data.daily.temperature_2m_max[i]);
      const min = convertTemp(data.daily.temperature_2m_min[i]);
      daily += `<div>Day ${i+1}: ${max.toFixed(1)}° / ${min.toFixed(1)}°</div>`;
    }

    results.innerHTML += `
      <div class="card">
        <h3>${label}</h3>
        <p>Current: ${current.toFixed(1)}°${unit}</p>
        <h4>Hourly</h4>
        ${hourly}
        <h4>5 Day</h4>
        ${daily}
      </div>
    `;
  }
}

function initMap(){
  const map = L.map("map").setView([32.93,-97.07],8);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  let marker;

  map.on("click", e=>{
    selectedCoords = e.latlng;
    if(marker) marker.setLatLng(e.latlng);
    else marker = L.marker(e.latlng).addTo(map);
  });
}

function addMapLocation(){
  if(!selectedCoords) return alert("Pick location on map");

  const val = document.getElementById("locations");
  val.value += `\n@${selectedCoords.lat},${selectedCoords.lng}|Map Location`;
}

initMap();
</script>

</body>
</html>
